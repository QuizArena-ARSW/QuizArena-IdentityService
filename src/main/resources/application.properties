# ==========================================================
# QuizArena - Servicio de Identidad - Configuracion
# ==========================================================
spring.application.name=servicio-identidad
server.port=8082

# ---- Base de datos (PostgreSQL del docker-compose, puerto 5433) ----
spring.datasource.url=jdbc:postgresql://localhost:5433/identidad_db
spring.datasource.username=quizarena
spring.datasource.password=quizarena123

# JPA / Hibernate: crea y actualiza las tablas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
# En produccion, esta clave va en una variable de entorno, NO en el codigo.
quizarena.jwt.secret=cambia-esta-clave-secreta-por-una-larga-y-aleatoria-de-al-menos-32-bytes
quizarena.jwt.expiracion-ms=86400000

logging.level.com.quizarena.identidad=DEBUG
