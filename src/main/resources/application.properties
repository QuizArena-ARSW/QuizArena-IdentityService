# ==========================================================
# QuizArena - Servicio de Identidad
# Configuracion externalizada: ${VARIABLE:valor_por_defecto}
# ==========================================================
spring.application.name=servicio-identidad
server.port=${PORT:8082}

# ---- Base de datos ----
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/identidad_db}
spring.datasource.username=${DB_USER:quizarena}
spring.datasource.password=${DB_PASSWORD:quizarena123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ---- JWT ----
# IMPORTANTE: en Azure esta clave se inyecta como SECRETO, nunca se sube al repo.
# Debe ser EXACTAMENTE la misma que usa el API Gateway. Sin valor por defecto
# a proposito: si falta la variable de entorno, la app debe fallar al
# arrancar en vez de firmar tokens con una clave publica en el repositorio.
quizarena.jwt.secret=${JWT_SECRET}
quizarena.jwt.expiracion-ms=${JWT_EXPIRACION_MS:86400000}

# ---- Limite de intentos de login (fuerza bruta) ----
quizarena.login.max-intentos=${LOGIN_MAX_INTENTOS:5}
quizarena.login.ventana-minutos=${LOGIN_VENTANA_MINUTOS:10}
quizarena.login.bloqueo-minutos=${LOGIN_BLOQUEO_MINUTOS:5}

# ---- Bancos predeterminados ----
# Cuenta cuyos bancos se muestran a todos los usuarios como "predeterminados".
quizarena.bancos.correo-oficial=${CORREO_OFICIAL_BANCOS:oficial@quizarena.com}

# ---- Correo (verificacion de cuenta) ----
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
quizarena.mail.remitente=${MAIL_FROM:${MAIL_USERNAME:no-reply@quizarena.com}}
quizarena.verificacion.expiracion-minutos=${VERIFICACION_EXPIRACION_MINUTOS:15}


