# Perfil solo para pruebas de integracion: H2 en memoria en vez de Postgres,
# para que la suite corra sola (local o en CI) sin depender de Docker.
spring.datasource.url=jdbc:h2:mem:identidad_test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

quizarena.jwt.secret=clave-secreta-de-pruebas-de-integracion-de-al-menos-32-bytes
quizarena.jwt.expiracion-ms=86400000
quizarena.verificacion.expiracion-minutos=15
quizarena.bancos.correo-oficial=oficial@quizarena.com
quizarena.mail.remitente=no-reply@quizarena.com

# Los intentos de login se limitan mas agresivo para poder probar el
# bloqueo sin escribir un test lento.
quizarena.login.max-intentos=3
quizarena.login.ventana-minutos=10
quizarena.login.bloqueo-minutos=5
